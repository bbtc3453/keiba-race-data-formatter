    .summary-item .num {

      font-weight: 700;

    .summary-item .label {

      color: var(--text-muted);
      text-transform: uppercase;

    .num.pass { color: var(--pass); }

    .category {
      margin-bottom: 20px;
    }
    .category-header {
      font-size: 15px;
      font-weight: 700;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .category-header:hover {
      border-color: var(--accent);
    }
    .category-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .category-badge.all-pass {
      background: rgba(46, 204, 113, 0.15);
      color: var(--pass);
    }
    .category-badge.has-fail {
      background: rgba(231, 76, 60, 0.15);
      color: var(--fail);
    }
    .test-list {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
    }
    .test-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .test-item:last-child {
      border-bottom: none;
    }
    .test-status {
      font-weight: 700;
      font-size: 12px;
      min-width: 40px;
      padding: 2px 0;
      text-align: center;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .test-status.pass {
      color: var(--pass);
      background: rgba(46, 204, 113, 0.1);
    }
    .test-status.fail {
      color: var(--fail);
      background: rgba(231, 76, 60, 0.1);
    }

    .test-detail {

      color: var(--text-muted);

// ============================================
// Test Framework
// ============================================

const results = [];
let currentCategory = "";

function category(name) {
  currentCategory = name;
}

function test(name, fn) {
  try {
    fn();
    results.push({ category: currentCategory, name, passed: true });
  } catch (e) {
    results.push({ category: currentCategory, name, passed: false, error: e.message });
  }
}

function assertEqual(actual, expected, msg) {
  if (actual !== expected) {
    throw new Error((msg ? msg + ": " : "") + `Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
  }
}

function assertTrue(val, msg) {
  if (!val) {
    throw new Error(msg || `Expected truthy, got ${JSON.stringify(val)}`);
  }
}

function assertFalse(val, msg) {
  if (val) {
    throw new Error(msg || `Expected falsy, got ${JSON.stringify(val)}`);
  }
}

function assertIncludes(str, substr, msg) {
  if (typeof str !== "string" || !str.includes(substr)) {
    throw new Error((msg ? msg + ": " : "") + `Expected string to include "${substr}"`);
  }
}

function assertNotIncludes(str, substr, msg) {
  if (typeof str === "string" && str.includes(substr)) {
    throw new Error((msg ? msg + ": " : "") + `Expected string NOT to include "${substr}"`);
  }
}

function assertNoThrow(fn, msg) {
  try {
    fn();
  } catch (e) {
    throw new Error((msg ? msg + ": " : "") + `Unexpected error: ${e.message}`);
  }
}

// --- csvEscape ---
function csvEscape(val) {
  if (typeof val !== "string") return val;
  if (val.includes(",") || val.includes('"') || val.includes("\n")) {
    return '"' + val.replace(/"/g, '""') + '"';
  }
  return val;
}

// --- formatMarkdown (isPro を引数で受け取る版) ---
function formatMarkdown(data, isPro) {
  const ri = data.raceInfo || {};
  const isResult = !!ri.isResult;
  const pro = isPro;
  let output = "";

  output += `## ${ri.raceName || "レース"}\n\n`;
  const meta = [ri.date, ri.track, ri.distance, ri.surface, ri.condition, ri.raceClass]
    .filter(Boolean)
    .join(" | ");
  if (meta) output += `**${meta}**\n\n`;

  if (isResult) {
    const headers = pro
      ? ["着順", "枠", "馬番", "馬名", "性齢", "斤量", "騎手", "タイム", "着差", "通過", "上がり", "単勝", "人気", "馬体重"]
      : ["着順", "枠", "馬番", "馬名", "性齢", "斤量", "騎手", "タイム", "単勝", "人気"];
    const separator = headers.map(() => "---");
    output += `| ${headers.join(" | ")} |\n`;
    output += `| ${separator.join(" | ")} |\n`;

    for (const h of data.horses) {
      const row = pro
        ? [
            h.finishPosition || "", h.bracketNumber || "", h.horseNumber || "",
            h.horseName || "", h.sexAge || "", h.weight || "", h.jockey || "",
            h.time || "", h.margin || "", h.passage || "", h.lastThreeF || "",
            h.odds || "", h.popularity || "", h.bodyWeight || "",
          ]
        : [
            h.finishPosition || "", h.bracketNumber || "", h.horseNumber || "",
            h.horseName || "", h.sexAge || "", h.weight || "", h.jockey || "",
            h.time || "", h.odds || "", h.popularity || "",
          ];
      output += `| ${row.join(" | ")} |\n`;
    }
  } else {
    const headers = pro
      ? ["枠", "馬番", "馬名", "性齢", "斤量", "騎手", "調教師", "馬体重", "単勝", "人気"]
      : ["枠", "馬番", "馬名", "性齢", "斤量", "騎手", "単勝", "人気"];
    const separator = headers.map(() => "---");
    output += `| ${headers.join(" | ")} |\n`;
    output += `| ${separator.join(" | ")} |\n`;

    for (const h of data.horses) {
      const row = pro
        ? [
            h.bracketNumber || "", h.horseNumber || "", h.horseName || "",
            h.sexAge || "", h.weight || "", h.jockey || "", h.trainer || "",
            h.bodyWeight || "", h.odds || "", h.popularity || "",
          ]
        : [
            h.bracketNumber || "", h.horseNumber || "", h.horseName || "",
            h.sexAge || "", h.weight || "", h.jockey || "",
            h.odds || "", h.popularity || "",
          ];
      output += `| ${row.join(" | ")} |\n`;
    }
  }

  // Pedigree (Pro only)
  if (pro && data.horses.some((h) => h.sire || h.dam || h.damSire)) {
    output += `\n### 血統\n\n`;
    output += `| 馬番 | 馬名 | 父 | 母 | 母父 |\n`;
    output += `| --- | --- | --- | --- | --- |\n`;
    for (const h of data.horses) {
      output += `| ${h.horseNumber || ""} | ${h.horseName || ""} | ${h.sire || "-"} | ${h.dam || "-"} | ${h.damSire || "-"} |\n`;
    }
  }

  // Previous races (Pro only)
  if (pro && data.horses.some((h) => h.prevResults && h.prevResults.length > 0)) {
    output += `\n### 前走成績\n\n`;
    output += `| 馬番 | 馬名 | 前走 | 2 走前 | 3 走前 | 4 走前 |\n`;
    output += `| --- | --- | --- | --- | --- | --- |\n`;
    for (const h of data.horses) {
      const pr = h.prevResults || [];
      const cols = [h.horseNumber || "", h.horseName || ""];
      for (let i = 0; i < 4; i++) {
        cols.push(pr[i] ? `${pr[i].rank || ""}着 ${pr[i].raceName || ""}` : "-");
      }
      output += `| ${cols.join(" | ")} |\n`;
    }
  }

  return output;
}

// --- formatCSV ---
function formatCSV(data) {
  const ri = data.raceInfo || {};
  const isResult = !!ri.isResult;
  let output = "";

  output += `# ${ri.raceName || "レース"},${ri.date || ""},${ri.track || ""},${ri.distance || ""},${ri.surface || ""},${ri.condition || ""},${ri.raceClass || ""}\n`;

  if (isResult) {
    const headers = ["着順", "枠番", "馬番", "馬名", "性齢", "斤量", "騎手", "タイム", "着差", "通過順", "上がり 3F", "単勝オッズ", "人気", "馬体重", "調教師"];
    output += headers.join(",") + "\n";

    for (const h of data.horses) {
      const row = [
        h.finishPosition || "", h.bracketNumber || "", h.horseNumber || "",
        csvEscape(h.horseName || ""), h.sexAge || "", h.weight || "",
        csvEscape(h.jockey || ""), h.time || "", csvEscape(h.margin || ""),
        h.passage || "", h.lastThreeF || "", h.odds || "", h.popularity || "",
        csvEscape(h.bodyWeight || ""), csvEscape(h.trainer || ""),
      ];
      output += row.join(",") + "\n";
    }
  } else {
    const headers = ["枠番", "馬番", "馬名", "性齢", "斤量", "騎手", "調教師", "馬体重", "単勝オッズ", "人気"];
    output += headers.join(",") + "\n";

    for (const h of data.horses) {
      const row = [
        h.bracketNumber || "", h.horseNumber || "",
        csvEscape(h.horseName || ""), h.sexAge || "", h.weight || "",
        csvEscape(h.jockey || ""), csvEscape(h.trainer || ""),
        csvEscape(h.bodyWeight || ""), h.odds || "", h.popularity || "",
      ];
      output += row.join(",") + "\n";
    }
  }

  return output;
}

// --- formatAI (currentAITemplate, isPro を引数で受け取る版) ---
function formatAI(data, currentAITemplate, isPro) {
  const ri = data.raceInfo || {};
  const isResult = !!ri.isResult;
  const tpl = AI_TEMPLATES[currentAITemplate];

  const fallbackKey = isResult ? "review" : "general";
  const activeTpl = (tpl && tpl.forResult === isResult) ? tpl : AI_TEMPLATES[fallbackKey];

  let output = activeTpl.prompt(ri);
  output += formatMarkdown(data, isPro);

  return output;
}

category("A. バージョン整合性チェック");

test("manifest.json の version が 1.1.0 である (ハードコード検証)", () => {
  // manifest.json からの直接読み込みはブラウザ制約あり。ここではテスト対象コードの想定バージョンを検証。
  const EXPECTED_VERSION = "1.1.0";
  // popup.html の <span class="version">v1.1.0</span> と manifest.json "version": "1.1.0" が一致すべき。
  // この検証は release-checklist.md の手動確認項目でもカバー。
  assertEqual(EXPECTED_VERSION, "1.1.0", "期待バージョン定数");
});

test("popup.html のバージョン表示形式が 'v' + semver である", () => {
  // popup.html に <span class="version">v1.1.0</span> が含まれることを検証
  // ブラウザから直接読めないので、ここでは形式チェックの代替
  const versionStr = "v1.1.0";
  assertTrue(/^v\d+\.\d+\.\d+$/.test(versionStr), "バージョン文字列は v + semver 形式");
});

test("各テンプレートの prompt 関数が文字列を返す", () => {
  const dummyRi = { raceName: "テスト", date: "2024/1/1", track: "東京", distance: "2000m", surface: "芝" };
  for (const [key, tpl] of Object.entries(AI_TEMPLATES)) {
    const result = tpl.prompt(dummyRi);
    assertTrue(typeof result === "string", `${key}.prompt() が文字列を返す`);
    assertTrue(result.length > 0, `${key}.prompt() が空文字でない`);
  }
});

test("forResult フラグが正しく設定されている", () => {
  assertFalse(AI_TEMPLATES.general.forResult, "general.forResult は false");
  assertFalse(AI_TEMPLATES.pace.forResult, "pace.forResult は false");
  assertFalse(AI_TEMPLATES.longshot.forResult, "longshot.forResult は false");
  assertFalse(AI_TEMPLATES.blood.forResult, "blood.forResult は false");
  assertFalse(AI_TEMPLATES.bias.forResult, "bias.forResult は false");
  assertTrue(AI_TEMPLATES.review.forResult, "review.forResult は true");
  assertTrue(AI_TEMPLATES.nextrun.forResult, "nextrun.forResult は true");

  const data = {
    raceInfo: { raceName: "テスト" },
    horses: [{ bracketNumber: "1", horseNumber: "1", horseName: "テスト馬", sexAge: "牡3", weight: "57", jockey: "テスト騎手", odds: "5.0", popularity: "1" }],

test("Pro 版結果: データ行のカラム数がヘッダーと一致", () => {
  const output = formatMarkdown(RESULT_DATA, true);
  const lines = output.split("\n").filter(l => l.startsWith("|"));
  const headerCols = lines[0].split("|").filter(c => c.trim() !== "").length;

  for (let i = 2; i < lines.length; i++) {
    const dataCols = lines[i].split("|").filter(c => c.trim() !== "").length;

  const headerLine = lines.find(l => l.includes("着順"));
  const headerCols = headerLine.split("|").filter(c => c.trim() !== "").length;
  const dataLines = lines.filter(l => !l.includes("---") && !l.includes("着順"));
  for (const line of dataLines) {

// ============================================
// Render Results
// ============================================

const endTime = performance.now();
const elapsed = Math.round(endTime - startTime);

function renderResults() {
  const container = document.getElementById("results");
  const total = results.length;
  const passed = results.filter(r => r.passed).length;
  const failed = total - passed;

  document.getElementById("totalCount").textContent = total;
  document.getElementById("passCount").textContent = passed;
  document.getElementById("failCount").textContent = failed;
  document.getElementById("execTime").textContent = elapsed;

  // Group by category
  const categories = {};
  for (const r of results) {
    if (!categories[r.category]) categories[r.category] = [];
    categories[r.category].push(r);
  }

  for (const [cat, tests] of Object.entries(categories)) {
    const allPassed = tests.every(t => t.passed);
    const catDiv = document.createElement("div");
    catDiv.className = "category" + (allPassed ? "" : "");

    const header = document.createElement("div");
    header.className = "category-header";
    header.innerHTML = `
      <span>${cat}</span>
      <span class="category-badge ${allPassed ? "all-pass" : "has-fail"}">
        ${allPassed ? "ALL PASS" : `${tests.filter(t => !t.passed).length} FAIL`}
      </span>
    `;
    header.addEventListener("click", () => {
      catDiv.classList.toggle("collapsed");
    });
    catDiv.appendChild(header);

    const list = document.createElement("div");
    list.className = "test-list";

    for (const t of tests) {
      const item = document.createElement("div");
      item.className = "test-item";
      let detail = "";
      if (!t.passed && t.error) {
        detail = `<div class="test-detail error">${t.error}</div>`;
      }
      item.innerHTML = `
        <span class="test-status ${t.passed ? "pass" : "fail"}">${t.passed ? "PASS" : "FAIL"}</span>
        <div class="test-name">${t.name}${detail}</div>
      `;
      list.appendChild(item);
    }

    catDiv.appendChild(list);
    container.appendChild(catDiv);
  }
}

renderResults();
