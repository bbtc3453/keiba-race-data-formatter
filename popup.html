<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="styles.css">
  <title>Keiba Race Data Formatter</title>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <svg class="header-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="6" fill="#e94560"/>
      <path d="M7 20 L14 6 L21 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M10 16 h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="14" cy="10" r="1.5" fill="#fff"/>
    </svg>
    <h1>Keiba Race Data Formatter</h1>
    <span class="version">v1.1.0</span>
  </div>

  <!-- Main Content -->
  <div class="content">

    <!-- Status Banner -->
    <div id="statusBanner" class="status-banner loading">
      <span class="status-dot"></span>
      <span id="statusText">ページを確認中...</span>
    </div>

    <!-- Page Info -->
    <div id="pageInfo" class="page-info" style="display:none;">
      <span class="site-name" id="siteName"></span> &mdash;
      <span class="page-type" id="pageType"></span>
    </div>

    <!-- Race Summary -->
    <div id="raceSummary" class="race-summary">
      <div class="race-name" id="raceName"></div>
      <div class="race-detail" id="raceDetail"></div>
      <div class="horse-count" id="horseCount"></div>
    </div>

    <!-- Format Selection -->
    <div id="formatSection" class="format-section" style="display:none;">
      <div class="format-label">出力フォーマット</div>
      <div class="format-options">
        <button class="format-btn active" data-format="markdown">Markdown</button>
        <button class="format-btn pro-only" data-format="csv">CSV <span class="pro-badge">PRO</span></button>
        <button class="format-btn" data-format="ai">AI 分析用</button>
      </div>
    </div>

    <!-- AI Template Selection (shown when AI format is selected) -->
    <div id="aiTemplateSection" class="ai-template-section" style="display:none;">
      <div class="format-label">AI プロンプト</div>
      <div id="aiTemplateOptions" class="ai-template-options">
        <!-- Dynamically populated -->
      </div>
    </div>

    <!-- License Section -->
    <div id="licenseSection" class="license-section">
      <div id="licenseFree" class="license-status free">
        <span class="license-icon">&#9898;</span>
        <span>Free プラン</span>
        <button id="btnShowLicense" class="btn-upgrade">Pro にアップグレード</button>
      </div>
      <div id="licensePro" class="license-status pro" style="display:none;">
        <span class="license-icon">&#9899;</span>
        <span>Pro プラン</span>
        <button id="btnDeactivate" class="btn-deactivate">解除</button>
      </div>
      <div id="licenseForm" class="license-form" style="display:none;">
        <input type="text" id="licenseKeyInput" class="license-input" placeholder="ライセンスキーを入力">
        <div class="license-form-actions">
          <button id="btnActivate" class="btn-activate">認証</button>
          <button id="btnCancelLicense" class="btn-cancel-license">キャンセル</button>
        </div>
        <div id="licenseError" class="license-error" style="display:none;"></div>
        <a href="#" id="btnBuyLink" class="buy-link">ライセンスキーを購入 &rarr;</a>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="btnExtract" class="btn-extract" disabled>データ抽出</button>
      <button id="btnCopy" class="btn-copy">クリップボードにコピー</button>
    </div>

    <!-- Preview -->
    <div id="previewSection" class="preview-section">
      <div class="preview-header">
        <span class="preview-label">プレビュー</span>
        <span class="preview-meta" id="previewMeta"></span>
      </div>
      <div class="preview-box" id="previewBox"></div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    DOM 読み取り専用 &mdash; データは外部送信されません
  </div>

  <script src="popup.js"></script>
</body>
</html>
